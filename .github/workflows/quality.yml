name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  required:
    name: Required quality contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact MoonBit toolchain
        uses: hustcer/setup-moonbit@bdc8c076af1f4c5012a6ac3451a2009ec75bf921
        with:
          version: latest
      - name: Verify exact MoonBit toolchain
        shell: pwsh
        run: |
          $expectedHashes=@{
            moon='50913178bee7e904850fc37d5b16adda7e6c1616d2704994714b70ac86f9a7ab'
            moonc='31633647318a571d6aac9a2144a0e1ba3c946ea806d1409778894fe76e604511'
            moonrun='44b7d5427837c8c0f7379a9d4fa9f3e1aac0f433041b3ffe16e78e1c5f151ab4'
          }
          foreach($command in @('moon','moonc','moonrun')) {
            $path=(Get-Command $command -CommandType Application -ErrorAction Stop).Source
            $actual=(Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -cne $expectedHashes[$command]) { throw "P08-TOOLCHAIN-BINARY-DIGEST: $command path=$path actual=$actual expected=$($expectedHashes[$command])" }
          }
          if ([string]@(& moon version)[0] -cne 'moon 0.1.20260713 (75c7e1f 2026-07-13)' -or
              [string]@(& moonc -v)[0] -cne 'v0.10.4+2cc641edf (2026-07-15)' -or
              [string]@(& moonrun --version)[0] -cne 'moonrun 0.1.20260713 (75c7e1f 2026-07-13)') { throw 'P08-TOOLCHAIN-IDENTITY' }
      - name: Run required quality lane
        shell: pwsh
        run: ./scripts/quality.ps1 -Lane Required -EvidenceDirectory artifacts/release-qualification/ci-required

  llvm-experimental:
    name: LLVM experimental (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up exact MoonBit toolchain
        uses: hustcer/setup-moonbit@bdc8c076af1f4c5012a6ac3451a2009ec75bf921
        with:
          version: latest
      - name: Verify exact MoonBit toolchain
        shell: pwsh
        run: |
          $expectedHashes=@{
            moon='50913178bee7e904850fc37d5b16adda7e6c1616d2704994714b70ac86f9a7ab'
            moonc='31633647318a571d6aac9a2144a0e1ba3c946ea806d1409778894fe76e604511'
            moonrun='44b7d5427837c8c0f7379a9d4fa9f3e1aac0f433041b3ffe16e78e1c5f151ab4'
          }
          foreach($command in @('moon','moonc','moonrun')) {
            $path=(Get-Command $command -CommandType Application -ErrorAction Stop).Source
            $actual=(Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -cne $expectedHashes[$command]) { throw "P08-TOOLCHAIN-BINARY-DIGEST: $command path=$path actual=$actual expected=$($expectedHashes[$command])" }
          }
          if ([string]@(& moon version)[0] -cne 'moon 0.1.20260713 (75c7e1f 2026-07-13)' -or
              [string]@(& moonc -v)[0] -cne 'v0.10.4+2cc641edf (2026-07-15)' -or
              [string]@(& moonrun --version)[0] -cne 'moonrun 0.1.20260713 (75c7e1f 2026-07-13)') { throw 'P08-TOOLCHAIN-IDENTITY' }
      - name: Run isolated LLVM experiment
        shell: pwsh
        run: ./scripts/quality.ps1 -Lane LlvmExperimental
